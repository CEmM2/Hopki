site_name: Hopki User Guide
site_description: User-facing documentation for Hopki split Hopkinson bar analysis.
site_url: https://cemm2.github.io/Hopki/
repo_url: https://github.com/CEmM2/Hopki
repo_name: CEmM2/Hopki
docs_dir: docs
site_dir: site
theme:
  name: mkdocs
  locale: en
  navigation_depth: 3
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Analysis Tab: analysis-tab.md
  - Parameters: parameters.md
  - Explore Tab: explore-tab.md
  - Curve Cleanup Tab: curve-cleanup-tab.md
  - Figures Tab: figures-tab.md
  - Command Line: command-line.md
  - Legacy Overview: legacy-overview.html
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - tables
  - toc:
      permalink: true
extra_css:
  - assets/stylesheets/hopki.css
extra_javascript:
  - assets/javascripts/theme-toggle.js
