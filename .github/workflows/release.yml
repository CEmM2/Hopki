name: Release

# Build the desktop GUI for macOS, Windows and Linux, then attach the binaries to the GitHub
# Release for the pushed tag. Trigger by pushing a version tag, e.g. `git push origin v0.1.0`.
# workflow_dispatch builds the same artifacts (downloadable from the run) without a release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      # Qt needs these shared libs present to link/run the standalone build on headless Linux.
      - name: Install Linux Qt runtime libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libgl1

      - name: Set up uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra gui --extra packaging

      - name: Build binary
        run: uv run python packaging/build.py

      # ditto preserves the .app bundle's metadata/symlinks better than plain zip.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent build/Hopki.app \
            "build/Hopki-macos-${{ github.ref_name }}.zip"
          echo "ASSET=build/Hopki-macos-${{ github.ref_name }}.zip" >> "$GITHUB_ENV"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mv build/hopki_app.dist build/Hopki
          tar -czf "build/Hopki-linux-${{ github.ref_name }}.tar.gz" -C build Hopki
          echo "ASSET=build/Hopki-linux-${{ github.ref_name }}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item build/hopki_app.dist build/Hopki
          Compress-Archive -Path build/Hopki -DestinationPath "build/Hopki-windows-${{ github.ref_name }}.zip"
          "ASSET=build/Hopki-windows-${{ github.ref_name }}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hopki-${{ runner.os }}
          path: ${{ env.ASSET }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
